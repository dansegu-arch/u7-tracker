<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Stats · U7 Season 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#CC0000; --dark:#0f0505; --card:#1a0a0a; --border:#3a1010;
    --muted:#7a4444; --text:#f5eaea; --accent:#ff3333; --white:#ffffff;
    --yellow:#ffc800;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--dark); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding-bottom:40px; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(204,0,0,0.04) 60px,rgba(204,0,0,0.04) 61px),repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(204,0,0,0.04) 60px,rgba(204,0,0,0.04) 61px); pointer-events:none; z-index:0; }
  .container { max-width:680px; margin:0 auto; padding:24px 16px; position:relative; z-index:1; }

  /* LOADING */
  #loading { position:fixed; inset:0; background:var(--dark); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  #loading img { width:64px; height:64px; object-fit:contain; animation:pulse 1.5s ease-in-out infinite; }
  #loading p { color:var(--muted); font-size:13px; letter-spacing:2px; text-transform:uppercase; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* TOAST */
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a0a0a; border:1px solid var(--border); border-left:3px solid var(--red); color:var(--text); padding:10px 18px; border-radius:8px; font-size:13px; z-index:500; transition:transform .3s; white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* HEADER */
  .back-btn { display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; text-decoration:none; margin-bottom:20px; padding:8px 12px; background:var(--card); border:1px solid var(--border); border-radius:8px; }
  .back-btn:active { opacity:.7; }
  .header-top { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
  .club-logo { width:52px; height:52px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(204,0,0,0.5)); }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(24px,6vw,42px); letter-spacing:3px; line-height:1; color:var(--white); }
  .subtitle { color:var(--muted); font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-top:3px; }
  .header-stripe { height:3px; background:linear-gradient(90deg,var(--red),transparent); border-radius:2px; margin:12px 0 24px; }

  /* STATS TABLE */
  .stats-header { display:grid; grid-template-columns:1fr 44px 44px 44px 44px; gap:6px; padding:8px 14px; margin-bottom:4px; }
  .sh-name { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .sh-stat { font-size:14px; text-align:center; }
  .player-row { display:grid; grid-template-columns:1fr 44px 44px 44px 44px; gap:6px; align-items:center; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .2s; }
  .player-row:active { border-color:var(--red); }
  .pr-name-wrap { display:flex; align-items:center; gap:10px; }
  .pr-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--border),#3a0a0a); display:flex; align-items:center; justify-content:center; font-family:"Bebas Neue",sans-serif; font-size:13px; color:#ff8888; border:1px solid var(--border); flex-shrink:0; }
  .pr-name { font-size:14px; font-weight:600; color:var(--white); }
  .pr-stat { text-align:center; }
  .pr-val { font-family:"Bebas Neue",sans-serif; font-size:22px; line-height:1; }
  .pr-goals { color:#00e676; }
  .pr-assists { color:#29b6f6; }
  .pr-potm { color:var(--yellow); }
  .pr-captain { color:#29b6f6; }
  .pr-zero { color:var(--border); }
  .legend { display:flex; gap:16px; flex-wrap:wrap; padding:10px 4px; font-size:11px; color:var(--muted); margin-top:4px; }

  /* LEADERBOARD */
  .leaderboard { margin-bottom:32px; }
  .lb-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--white); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .pill { background:rgba(204,0,0,0.18); color:var(--accent); font-size:10px; padding:2px 8px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; font-family:'DM Sans',sans-serif; }
  .lb-row { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .2s; }
  .lb-row:active { border-color:var(--red); }
  .lb-row.top1 { border-left:3px solid var(--yellow); background:linear-gradient(135deg,rgba(255,200,0,0.08),var(--card)); }
  .lb-row.top2 { border-left:3px solid #aaa; }
  .lb-row.top3 { border-left:3px solid #cd7f32; }
  .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--muted); width:28px; text-align:center; flex-shrink:0; }
  .lb-row.top1 .lb-rank { color:var(--yellow); }
  .lb-row.top2 .lb-rank { color:#aaa; }
  .lb-row.top3 .lb-rank { color:#cd7f32; }
  .lb-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--border),#3a0a0a); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:15px; color:#ff8888; flex-shrink:0; border:1px solid var(--border); }
  .lb-info { flex:1; }
  .lb-name { font-size:15px; font-weight:600; color:var(--white); }
  .lb-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .lb-stats { display:flex; gap:12px; flex-shrink:0; }
  .lb-stat { text-align:center; }
  .lb-val { font-family:'Bebas Neue',sans-serif; font-size:24px; line-height:1; }
  .lb-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .goals-col { color:#00e676; }
  .assists-col { color:#29b6f6; }

  /* PLAYER DETAIL MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#1a0a0a; border:1px solid var(--border); border-top:2px solid var(--red); border-radius:16px 16px 0 0; padding:24px 20px 36px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
  .modal-drag { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal h3 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; margin-bottom:16px; color:var(--white); }
  .modal label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); display:block; margin-bottom:4px; margin-top:12px; }
  .modal input { width:100%; background:#0f0505; border:1px solid var(--border); border-radius:8px; padding:11px 12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; }
  .modal input:focus { border-color:var(--red); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-primary { flex:1; background:var(--red); color:#fff; border:none; border-radius:8px; padding:13px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:15px; cursor:pointer; }
  .btn-secondary { flex:1; background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:8px; padding:13px; font-family:'DM Sans',sans-serif; font-size:15px; cursor:pointer; }
  .big-stat-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .big-stat-box { border-radius:10px; padding:16px; text-align:center; }
  .big-stat-box .val { font-family:'Bebas Neue',sans-serif; font-size:52px; line-height:1; }
  .big-stat-box .lbl { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:4px; }
  .game-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .game-row:last-child { border-bottom:none; }
  .potm-highlight { display:flex; align-items:center; gap:8px; background:rgba(255,200,0,0.08); border:1px solid rgba(255,200,0,0.2); border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:13px; color:var(--yellow); }
  .captain-highlight { display:flex; align-items:center; gap:8px; background:rgba(41,182,246,0.08); border:1px solid rgba(41,182,246,0.2); border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:13px; color:#29b6f6; }
  .add-btn { width:100%; background:transparent; border:1px dashed var(--border); color:var(--muted); padding:12px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px; }

  /* COACH ONLY */
  body.locked .coach-only { display:none !important; }
  #lock-bar { position:fixed; bottom:0; left:0; right:0; z-index:300; background:#1a0a0a; border-top:2px solid var(--border); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; }
  #lock-status { font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  #lock-status.unlocked { color:#00e676; }
  #lock-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; }
  body { padding-bottom:70px; }
</style>
</head>
<body>

<div id="loading">
  <img src="https://georgecrossfc.com.au/wp-content/uploads/2019/01/Caroline-Springs_George-Cross-FC.png" alt="">
  <p>Loading stats…</p>
</div>
<div id="toast"></div>

<div class="container">
  <a class="back-btn" href="tracker-2026-31.html">← Back to Tracker</a>

  <div class="header-top">
    <img class="club-logo" src="https://georgecrossfc.com.au/wp-content/uploads/2019/01/Caroline-Springs_George-Cross-FC.png" onerror="this.style.display='none'">
    <div>
      <h1>Player Stats</h1>
      <div class="subtitle">George Cross FC · U7 · Season 2026</div>
    </div>
  </div>
  <div class="header-stripe"></div>

  <!-- Player Stats Table -->
  <div>
    <div class="lb-title">All Players <span class="pill">2026</span></div>
    <!-- Header -->
    <div class="stats-header">
      <div class="sh-name">Player</div>
      <div class="sh-stat">⚽</div>
      <div class="sh-stat">🎯</div>
      <div class="sh-stat">⭐</div>
      <div class="sh-stat">🎖️</div>
    </div>
    <div id="all-players-list"></div>
    <!-- Legend -->
    <div class="legend">
      <span>⚽ Goals</span>
      <span>🎯 Assists</span>
      <span>⭐ POTM</span>
      <span>🎖️ Captain</span>
    </div>
  </div>
</div>

<!-- PLAYER DETAIL MODAL -->
<div class="modal-overlay" id="ps-modal">
  <div class="modal">
    <div class="modal-drag"></div>
    <h3 id="ps-name">Player</h3>
    <div id="ps-highlights"></div>
    <div class="big-stat-row">
      <div class="big-stat-box" style="background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);">
        <div class="val goals-col" id="ps-goals">0</div>
        <div class="lbl">⚽ Goals</div>
      </div>
      <div class="big-stat-box" style="background:rgba(41,182,246,0.08);border:1px solid rgba(41,182,246,0.2);">
        <div class="val assists-col" id="ps-assists">0</div>
        <div class="lbl">🎯 Assists</div>
      </div>
    </div>
    <div id="ps-breakdown"></div>
    <div id="ps-assist-edit" style="display:none;margin-top:12px;">
      <label>Update Total Assists</label>
      <input type="number" id="ps-assist-input" min="0" max="99">
      <div class="modal-actions">
        <button class="btn-secondary" onclick="document.getElementById('ps-assist-edit').style.display='none'">Cancel</button>
        <button class="btn-primary" onclick="saveAssists()">Save</button>
      </div>
    </div>
    <button id="ps-edit-btn" class="add-btn coach-only" onclick="document.getElementById('ps-assist-edit').style.display='block'">🎯 Edit Assists</button>
    <button class="btn-secondary" onclick="closeModal('ps-modal')" style="width:100%;margin-top:10px;">Close</button>
  </div>
</div>

<!-- LOCK BAR -->
<div id="lock-bar">
  <span id="lock-status">🔒 View only</span>
  <button id="lock-btn" onclick="toggleLock()">🔐 Coach Login</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcNuFQefTPd5ssKFYOByS4RwsyXieW32A",
    authDomain: "phill-u7-soccer.firebaseapp.com",
    projectId: "phill-u7-soccer",
    storageBucket: "phill-u7-soccer.firebasestorage.app",
    messagingSenderId: "498467619214",
    appId: "1:498467619214:web:fae753c318bed77289e4df",
    databaseURL: "https://phill-u7-soccer-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const PLAYERS = ['Aiden','Alessio','Angelo','Aydin','Cruz','Harrison','Leo','Mason'];
  const PIN = '1212';
  let fixturesData = {};
  let playerStatsData = {};
  let isUnlocked = false;
  let activeStatPlayer = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  window.openModal = function(id) { document.getElementById(id).classList.add('open'); };
  window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };
  document.querySelectorAll('.modal-overlay').forEach(function(o) {
    o.addEventListener('click', function(e) { if (e.target === o) o.classList.remove('open'); });
  });

  // ── LOCK ──────────────────────────────────────────────────────────
  document.body.classList.add('locked');
  window.toggleLock = function() {
    if (isUnlocked) {
      isUnlocked = false;
      document.body.classList.add('locked');
      document.getElementById('lock-status').textContent = 'View only';
      document.getElementById('lock-status').classList.remove('unlocked');
      document.getElementById('lock-btn').textContent = 'Coach Login';
      showToast('Locked');
    } else {
      const pin = prompt('Enter coach PIN:');
      if (pin === PIN) {
        isUnlocked = true;
        document.body.classList.remove('locked');
        document.getElementById('lock-status').textContent = 'Edit mode ON';
        document.getElementById('lock-status').classList.add('unlocked');
        document.getElementById('lock-btn').textContent = 'Lock';
        showToast('Edit mode unlocked!');
      } else if (pin !== null) {
        showToast('Wrong PIN');
      }
    }
  };

  // ── CALCULATE STATS ───────────────────────────────────────────────
  function calcStats() {
    const stats = {};
    PLAYERS.forEach(function(p) {
      stats[p] = {
        goals: 0,
        assists: (playerStatsData[p] && playerStatsData[p].assists) ? playerStatsData[p].assists : 0,
        potm: 0,
        captain: 0,
        games: []
      };
    });

    Object.values(fixturesData).forEach(function(f) {
      // Goals
      if (f.goals) {
        Object.entries(f.goals).forEach(function(e) {
          const name = e[0], count = parseInt(e[1]) || 0;
          const match = PLAYERS.find(function(p) { return p.toLowerCase() === name.toLowerCase(); });
          if (match) {
            stats[match].goals += count;
            stats[match].games.push({opponent: f.opponent, date: f.date, goals: count});
          }
        });
      }
      // POTM
      if (f.potm) {
        const match = PLAYERS.find(function(p) { return p.toLowerCase() === (f.potm || '').toLowerCase(); });
        if (match) stats[match].potm++;
      }
      // Captain
      if (f.captain) {
        const match = PLAYERS.find(function(p) { return p.toLowerCase() === (f.captain || '').toLowerCase(); });
        if (match) stats[match].captain++;
      }
    });

    return stats;
  }

  // ── RENDER ALL PLAYERS TABLE ──────────────────────────────────────
  function renderLeaderboards() {
    const stats = calcStats();
    const el = document.getElementById('all-players-list');
    if (!el) return;
    el.innerHTML = '';
    PLAYERS.forEach(function(name) {
      const s = stats[name];
      const initials = name.slice(0, 2).toUpperCase();
      const row = document.createElement('div');
      row.className = 'player-row';
      row.innerHTML =
        '<div class="pr-name-wrap">' +
          '<div class="pr-avatar">' + initials + '</div>' +
          '<div class="pr-name">' + name + '</div>' +
        '</div>' +
        '<div class="pr-stat"><div class="pr-val ' + (s.goals > 0 ? 'pr-goals' : 'pr-zero') + '">' + s.goals + '</div></div>' +
        '<div class="pr-stat"><div class="pr-val ' + (s.assists > 0 ? 'pr-assists' : 'pr-zero') + '">' + s.assists + '</div></div>' +
        '<div class="pr-stat"><div class="pr-val ' + (s.potm > 0 ? 'pr-potm' : 'pr-zero') + '">' + s.potm + '</div></div>' +
        '<div class="pr-stat"><div class="pr-val ' + (s.captain > 0 ? 'pr-captain' : 'pr-zero') + '">' + s.captain + '</div></div>';
      row.onclick = function() { openPlayerDetail(name, s); };
      el.appendChild(row);
    });
  }

  // ── PLAYER DETAIL ─────────────────────────────────────────────────
  function openPlayerDetail(name, s) {
    activeStatPlayer = name;
    document.getElementById('ps-name').textContent = name;
    document.getElementById('ps-goals').textContent = s.goals;
    document.getElementById('ps-assists').textContent = s.assists;
    document.getElementById('ps-assist-input').value = s.assists;
    document.getElementById('ps-assist-edit').style.display = 'none';
    document.getElementById('ps-edit-btn').style.display = isUnlocked ? 'flex' : 'none';

    // Highlights
    let highlights = '';
    if (s.potm > 0) highlights += '<div class="potm-highlight">⭐ Player of the Match × ' + s.potm + '</div>';
    if (s.captain > 0) highlights += '<div class="captain-highlight">🎖️ Team Captain × ' + s.captain + '</div>';
    document.getElementById('ps-highlights').innerHTML = highlights;

    // Goal breakdown
    let breakdown = '';
    if (s.games && s.games.length > 0) {
      breakdown = '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;">Goal Breakdown</div>';
      s.games.forEach(function(g) {
        breakdown += '<div class="game-row"><span>' + (g.opponent || '—') + '</span><span style="color:#00e676;font-weight:600;">⚽ ' + g.goals + '</span></div>';
      });
    } else {
      breakdown = '<div style="color:var(--muted);font-size:12px;font-style:italic;margin-top:4px;">No goals recorded yet</div>';
    }
    document.getElementById('ps-breakdown').innerHTML = breakdown;

    openModal('ps-modal');
  }

  window.saveAssists = function() {
    if (!activeStatPlayer) return;
    const val = parseInt(document.getElementById('ps-assist-input').value) || 0;
    set(ref(db, 'season2026/playerStats/' + activeStatPlayer), {assists: val});
    document.getElementById('ps-assists').textContent = val;
    document.getElementById('ps-assist-edit').style.display = 'none';
    showToast('Assists saved!');
  };

  // ── FIREBASE ──────────────────────────────────────────────────────
  onValue(ref(db, 'season2026/fixtures'), function(snap) {
    fixturesData = snap.val() || {};
    renderLeaderboards();
  });

  onValue(ref(db, 'season2026/playerStats'), function(snap) {
    playerStatsData = snap.val() || {};
    renderLeaderboards();
  });

  // Hide loading
  let loaded = false;
  onValue(ref(db, 'meta'), function() {
    if (!loaded) { loaded = true; document.getElementById('loading').style.display = 'none'; }
  }, {onlyOnce: true});
  setTimeout(function() { document.getElementById('loading').style.display = 'none'; }, 4000);
</script>
</body>
</html>
